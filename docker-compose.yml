version: "3.8"

services:
  flash-games:
    build: .
    image: abingel/flash-games-swf:latest
    container_name: flash-games-swf
    ports:
      - "3000:3000"
    volumes:
      # SWF 游戏文件目录（放 .swf 文件，自动扫描入库）
      - ./game:/app/game
      # SQLite 数据库 + 云存档持久化
      - ./data:/app/data
    environment:
      # 管理密码（部署前务必修改）
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-flash2024}
      # 云存档目录（默认在 data 卷内）
      - CLOUD_SAVE_DIR=/app/data/cloud-saves
    restart: unless-stopped
